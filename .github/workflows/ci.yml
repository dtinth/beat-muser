name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: vp check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - run: vp test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: ci-reports/vitest/
          retention-days: 1

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v2
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - uses: dtinth/setup-playwright-test-docker@main
      - run: pitchfork start dev
      - run: npx playwright test
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ci-reports/playwright/
          retention-days: 1

  deploy-reports:
    needs: [test, e2e]
    if: github.ref == 'refs/heads/main' && always() && (needs.test.result == 'success' || needs.test.result == 'failure') && (needs.e2e.result == 'success' || needs.e2e.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true
      - uses: actions/download-artifact@v4
        with:
          name: vitest-report
          path: ci-reports/vitest/
      - uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: ci-reports/playwright/
      - run: node bin/generate-report-index.ts
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ci-reports/
      - uses: actions/deploy-pages@v4
        id: deployment
